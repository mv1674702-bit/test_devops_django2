<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login here </h1>

    <form method="post">
        {% csrf_token %}
        <label for="">Username</label>
        <input type="text" name="username">
        <label for="">Password</label>
        <input type="text" name="password">
        <button>Submit</button>
    </form>
</body>
</html>
